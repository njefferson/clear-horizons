# Deploy Clear Horizons to Cloudflare Pages.
#
# main    -> production          (clear-horizons.pages.dev)
# staging -> a Cloudflare PREVIEW deployment (the on-device gate before main)
# any other pushed branch -> its own preview URL, production untouched.
#
# Tier 2 rename (2026-07-19): the Pages project is `clear-horizons` (the
# create step below mints it if missing). The old `star-horizon-planner`
# project no longer receives deploys — it stays frozen on its last build
# (v2.16.0), whose only job is the in-app "we've moved" banner + backup-export
# path for stragglers. Deleting that project entirely is Noah's option; while
# it costs nothing, it's a permanent signpost.
#
# Needs two repo secrets (same account as the sibling apps):
#   CLOUDFLARE_API_TOKEN   (account-wide Pages:Edit token)
#   CLOUDFLARE_ACCOUNT_ID
# No functions/ proxy and no API keys — astronomy-engine is vendored and runs
# on-device; the roadmap data sources (Open-Meteo, hips2fits) are keyless and
# CORS-friendly, so there is nothing to proxy.
name: Deploy Clear Horizons to Cloudflare Pages

on:
  push:
    branches: [ main, staging ]
  workflow_dispatch:

# One deploy per branch at a time; a newer push supersedes an in-flight one so
# two runs can't finish out of order and leave production serving an older build.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Ensure Pages project exists
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create clear-horizons --production-branch=main

      # Assemble the publishable site into dist/ (allow-list, no build step —
      # no-build vanilla ES modules) so repo internals (NOTES.md, review docs,
      # test/, scripts/, package.json) never reach production, then verify the
      # bundle before publishing.
      - name: Stage dist/
        run: node scripts/stage-dist.mjs
      - name: Verify dist/ (precache parity + no leaks)
        run: node scripts/check-dist.mjs

      # branch=main is production; any other branch is a preview.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=clear-horizons --branch=${{ github.ref_name }} --commit-dirty=true
