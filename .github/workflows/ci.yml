# Headless checks on every push / PR: the Node unit tests, the catalog validate
# gate, and the WCAG contrast gate (accessibility standing order — colour is
# decided by computation, in CI). No build step (no-build vanilla ES modules);
# no network. The axe view-scan (npm run test:a11y) needs a browser, so it runs
# in the release ritual alongside the UI smoke rather than here.
name: CI

on:
  push:
    branches: [ main, staging ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Unit tests
        run: node --test
      - name: Validate bundled catalog
        run: node scripts/build-catalog.mjs validate
      - name: Contrast gate (WCAG AA, both themes)
        run: node scripts/check-contrast.mjs
